<!doctype html>
<html>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no'>
    <style>
      body {
        background-color: #F0F0F0;
        font: 1rem/1.4 -apple-system, BlinkMacSystemFont,
          Segoe UI, Roboto, Oxygen,
          Ubuntu, Cantarell, Fira Sans,
          Droid Sans, Helvetica Neue, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      header {
        padding: 0.5em;
        background-color: rgba(255, 255, 255, 0.90);
      }

      #info {
        font-size: 1.25em;
        background-color: rgba(240, 240, 240, 0.5);
      }

      #dpad-controls {
        position: fixed;
        left: 0.75rem;
        bottom: 8.5rem;
        z-index: 2;
        display: grid;
        grid-template-columns: 3.75rem 3.75rem 3.75rem;
        grid-template-rows: 3.75rem 3.75rem 3.75rem;
        gap: 0.45rem;
        grid-template-areas:
          ". up ."
          "left center right"
          ". down .";
      }

      #tool-roll-controls {
        position: fixed;
        left: 50%;
        bottom: 4.35rem;
        z-index: 2;
        display: flex;
        flex-direction: row;
        gap: 0.6rem;
        transform: translateX(-50%);
      }

      #gripper-controls {
        position: fixed;
        left: 50%;
        bottom: 0.55rem;
        z-index: 2;
        display: flex;
        flex-direction: row;
        gap: 0.6rem;
        transform: translateX(-50%);
      }

      #z-controls {
        position: fixed;
        right: 0.75rem;
        bottom: 8.5rem;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .overlay-button {
        border: none;
        border-radius: 1rem;
        background: rgba(16, 24, 32, 0.82);
        color: #fff;
        font-weight: 600;
        box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.2);
      }

      .overlay-button.active {
        background: rgba(34, 102, 196, 0.9);
      }

      .dpad-button {
        width: 3.75rem;
        min-height: 3.75rem;
        font-size: 1.35rem;
        line-height: 1;
      }

      #dpad-up { grid-area: up; }
      #dpad-left { grid-area: left; }
      #dpad-right { grid-area: right; }
      #dpad-down { grid-area: down; }

      #dpad-center {
        grid-area: center;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(2px);
      }

      .z-button {
        width: 4.5rem;
        min-height: 3.75rem;
        font-size: 1.05rem;
      }

      .roll-button {
        width: 5.4rem;
        min-height: 3.5rem;
        font-size: 1rem;
      }

      .gripper-button {
        width: 5rem;
        min-height: 3rem;
        font-size: 1rem;
      }

      canvas {
        position: absolute;
        z-index: 0;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <header></header>
      <div id="dpad-controls">
        <button id="dpad-up" class="overlay-button dpad-button" type="button">↑</button>
        <button id="dpad-left" class="overlay-button dpad-button" type="button">←</button>
        <div id="dpad-center"></div>
        <button id="dpad-right" class="overlay-button dpad-button" type="button">→</button>
        <button id="dpad-down" class="overlay-button dpad-button" type="button">↓</button>
      </div>
      <div id="z-controls">
        <button id="z-up" class="overlay-button z-button" type="button">上移</button>
        <button id="z-down" class="overlay-button z-button" type="button">下移</button>
      </div>
      <div id="tool-roll-controls">
        <button id="tool-roll-left" class="overlay-button roll-button" type="button">左旋</button>
        <button id="tool-roll-right" class="overlay-button roll-button" type="button">右旋</button>
      </div>
      <div id="gripper-controls">
        <button id="gripper-open" class="overlay-button gripper-button" type="button">打开</button>
        <button id="gripper-close" class="overlay-button gripper-button" type="button">闭合</button>
      </div>
      <p><span id="info"></span></p>
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="text/javascript">
      // Random device ID
      const deviceId = Math.random().toString(36).substring(2, 15);

      // Round-trip time (RTT) statistics
      class RTTStats {
        constructor(bufferSize) {
          this.bufferSize = bufferSize;
          this.bufferIndex = 0;
          this.rttArray = new Array(bufferSize).fill(0); // Initialize the circular buffer
        }

        calculate(rtt) {
          this.rttArray[this.bufferIndex] = rtt;
          this.bufferIndex = (this.bufferIndex + 1) % this.bufferSize;
          const minRtt = Math.min(...this.rttArray);
          const avgRtt = this.rttArray.reduce((acc, cur) => acc + cur, 0) / this.bufferSize;
          const maxRtt = Math.max(...this.rttArray);
          const stdDevRtt = Math.sqrt(this.rttArray.map((x) => (x - avgRtt) ** 2).reduce((acc, cur) => acc + cur, 0) / this.bufferSize);
          return `${minRtt.toFixed(3)}/${avgRtt.toFixed(3)}/${maxRtt.toFixed(3)}/${stdDevRtt.toFixed(3)} ms`;
        }
      }
      const rttStats = new RTTStats(100);

      // Socket to communicate with server
      const socket = io();

      // Calculate RTT from server response
      socket.on('echo', (timestamp) => {
        const rtt = Date.now() - timestamp;
        document.getElementById('info').innerText = rttStats.calculate(rtt);
      });

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });
    </script>
    <script type="module">
      import { WebXRButton } from '/static/js/webxr-button.js';

      // XR globals
      let xrButton = null;
      let xrRefSpace = null;
      let lastSendTimeMs = 0;
      let lastIdleSendTimeMs = 0;
      const activeSendIntervalMs = 50;
      const idleSendIntervalMs = 200;

      // WebGL scene globals
      let gl = null;

      function initXR() {
        xrButton = new WebXRButton({
          onRequestSession,
          onPrepareEndSession,
          onEndSession,
          textEnterXRTitle: 'Start episode',
          textXRNotFoundTitle: 'AR NOT FOUND',
          textPrepareExitXRTitle: 'End episode',
          textExitXRTitle: 'Reset env',
        });
        document.querySelector('header').appendChild(xrButton.domElement);

        if (navigator.xr) {
          navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
            xrButton.enabled = supported;
          });
        }
      }

      function onRequestSession() {
        return navigator.xr.requestSession('immersive-ar', {
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.getElementById('overlay') },
        }).then((session) => {
          xrButton.setSession(session);
          session.isImmersive = true;
          onSessionStarted(session);
        });
      }

      function onSessionStarted(session) {
        session.addEventListener('end', onSessionEnded);
        const canvas = document.createElement('canvas');
        gl = canvas.getContext('webgl', {
          xrCompatible: true,
        });
        addTouchListeners();
        session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });
        session.requestReferenceSpace('local').then((refSpace) => {
          xrRefSpace = refSpace;
          session.requestAnimationFrame(onXRFrame);
        });

        // Let the server know user has started the episode
        const data = { timestamp: Date.now(), state_update: 'episode_started' };
        socket.send(data);
      }

      function onPrepareEndSession() {
        // Let the server know user has ended the episode
        const data = { timestamp: Date.now(), state_update: 'episode_ended' };
        socket.send(data);
      }

      function onEndSession(session) {
        session.end();

        // Let the server know user is ready for env reset
        const data = { timestamp: Date.now(), state_update: 'reset_env' };
        socket.send(data);
      }

      function onSessionEnded(event) {
        xrButton.setSession(null);
        gl = null;
      }

      // Touch event handling
      let touchId; let touchStartY; let touchDeltaY; let teleopMode;
      let cartesianNudge = [0, 0, 0];
      let toolRollDir = 0;
      let gripperDir = 0;
      let touchListenersAdded = false;

      function addTouchListeners() {
        if (touchListenersAdded) return;
        touchListenersAdded = true;

        function handleTouch(touch) {
          touchDeltaY = (touchStartY - touch.clientY) / (0.2 * window.innerHeight);
          touchDeltaY = Math.min(1, Math.max(-1, touchDeltaY));
        }

        function shouldIgnoreTarget(target) {
          const tag = target?.tagName?.toUpperCase();
          return tag === 'BUTTON' || tag === 'A' || tag === 'INPUT';
        }

        function bindHoldButton(buttonId, onChange) {
          const button = document.getElementById(buttonId);
          if (!button) return;

          function setActive(active) {
            onChange(active);
            button.classList.toggle('active', active);
          }

          button.addEventListener('touchstart', (event) => {
            setActive(true);
            event.preventDefault();
          }, { passive: false });
          button.addEventListener('touchend', (event) => {
            setActive(false);
            event.preventDefault();
          }, { passive: false });
          button.addEventListener('touchcancel', (event) => {
            setActive(false);
            event.preventDefault();
          }, { passive: false });
          button.addEventListener('mousedown', (event) => {
            setActive(true);
            event.preventDefault();
          });
          button.addEventListener('mouseup', (event) => {
            setActive(false);
            event.preventDefault();
          });
          button.addEventListener('mouseleave', () => {
            setActive(false);
          });
        }

        bindHoldButton('dpad-up', (active) => {
          cartesianNudge[0] = active ? 1 : (cartesianNudge[0] > 0 ? 0 : cartesianNudge[0]);
        });
        bindHoldButton('dpad-down', (active) => {
          cartesianNudge[0] = active ? -1 : (cartesianNudge[0] < 0 ? 0 : cartesianNudge[0]);
        });
        bindHoldButton('dpad-left', (active) => {
          cartesianNudge[1] = active ? 1 : (cartesianNudge[1] > 0 ? 0 : cartesianNudge[1]);
        });
        bindHoldButton('dpad-right', (active) => {
          cartesianNudge[1] = active ? -1 : (cartesianNudge[1] < 0 ? 0 : cartesianNudge[1]);
        });
        bindHoldButton('z-up', (active) => {
          cartesianNudge[2] = active ? 1 : (cartesianNudge[2] > 0 ? 0 : cartesianNudge[2]);
        });
        bindHoldButton('z-down', (active) => {
          cartesianNudge[2] = active ? -1 : (cartesianNudge[2] < 0 ? 0 : cartesianNudge[2]);
        });
        bindHoldButton('tool-roll-left', (active) => {
          toolRollDir = active ? -1 : (toolRollDir < 0 ? 0 : toolRollDir);
        });
        bindHoldButton('tool-roll-right', (active) => {
          toolRollDir = active ? 1 : (toolRollDir > 0 ? 0 : toolRollDir);
        });
        bindHoldButton('gripper-open', (active) => {
          gripperDir = active ? 1 : (gripperDir > 0 ? 0 : gripperDir);
        });
        bindHoldButton('gripper-close', (active) => {
          gripperDir = active ? -1 : (gripperDir < 0 ? 0 : gripperDir);
        });

        document.addEventListener('touchstart', (event) => {
          if (shouldIgnoreTarget(event.target)) return;
          if (touchId === undefined) {
            const touch = event.changedTouches[0];
            touchId = touch.identifier;
            touchStartY = touch.clientY;
            teleopMode = touch.clientX < 0.9 * window.innerWidth ? 'arm' : 'base';
            handleTouch(touch);
          }
          event.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (event) => {
          if (shouldIgnoreTarget(event.target)) return;
          for (const touch of event.changedTouches) {
            if (touchId === touch.identifier) {
              handleTouch(touch);
            }
          }
          event.preventDefault();
        }, { passive: false });

        function updateTouchIds(event) {
          for (const touch of event.changedTouches) {
            if (touchId === touch.identifier) {
              touchId = undefined;
            }
          }
        }

        document.addEventListener('touchend', updateTouchIds, { passive: false });
        document.addEventListener('touchcancel', updateTouchIds, { passive: false });
        document.addEventListener('contextmenu', (event) => {
          event.preventDefault();
        });
      }

      function onXRFrame(t, frame) {
        frame.session.requestAnimationFrame(onXRFrame);

        // Visualize status of touch control
        const buttonMagnitude = Math.abs(cartesianNudge[0]) + Math.abs(cartesianNudge[1]) + Math.abs(cartesianNudge[2]);
        const active = touchId !== undefined || buttonMagnitude > 0 || toolRollDir !== 0 || gripperDir !== 0;
        const r = toolRollDir !== 0 ? 0.18 : ((active && teleopMode === 'base') ? 0.25 : 0);
        const g = buttonMagnitude > 0 ? 0.18 : 0;
        const b = (active && teleopMode === 'arm')
          ? (Math.abs(touchDeltaY) === 1 ? 1 : 0.25 + 0.25 * touchDeltaY)
          : (gripperDir !== 0 ? 0.18 : 0);
        gl.clearColor(r, g, b, 0.5);
        gl.clear(gl.COLOR_BUFFER_BIT);

        // Send data to server at a bounded rate to avoid overloading mobile browsers.
        const nowMs = Date.now();
        const sendIntervalMs = active ? activeSendIntervalMs : idleSendIntervalMs;
        const lastSentMs = active ? lastSendTimeMs : lastIdleSendTimeMs;
        if (nowMs - lastSentMs < sendIntervalMs) {
          return;
        }
        if (active) {
          lastSendTimeMs = nowMs;
        } else {
          lastIdleSendTimeMs = nowMs;
        }

        const data = { timestamp: nowMs, device_id: deviceId };
        if (active) {
          const pose = frame.getViewerPose(xrRefSpace);
          if (pose) {
            data.teleop_mode = touchId !== undefined ? teleopMode : 'arm';
            data.pose_control_active = touchId !== undefined;
            data.position = {
              x: pose.transform.position.x,
              y: pose.transform.position.y,
              z: pose.transform.position.z,
            };
            data.orientation = {
              x: pose.transform.orientation.x,
              y: pose.transform.orientation.y,
              z: pose.transform.orientation.z,
              w: pose.transform.orientation.w,
            };
          }
          if ((touchId !== undefined ? teleopMode : 'arm') === 'arm') {
            data.gripper_delta = touchDeltaY;
            data.gripper_dir = gripperDir;
            data.tool_roll_dir = toolRollDir;
            data.cartesian_nudge = cartesianNudge.slice();
          }
        }
        socket.send(data);
      }

      initXR();
    </script>
  </body>
</html>
